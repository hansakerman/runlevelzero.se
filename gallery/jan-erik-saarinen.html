<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RUN LEVEL ZERO — Promo Photos by Jan-Erik Saarinen</title>
  <style>html,body{background:#000;color:#f5f5f5}</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/index_f6e4.6d5d31be.css">
</head>
<body>
  <div class="layout">
    <div class="description description-text">
      <div class="quick-links">
        <p class="quick-link"><a href="/index.html">Home</a></p>
        <p class="quick-link"><a href="/gallery.html">Gallery</a></p>
        <p class="quick-link"><a href="/livedates.html">Live Dates</a></p>
      </div>

      <h1 class="page-title">Promo Photos — Jan-Erik Saarinen</h1>
      <p class="intro-text">Promo pictures of Hans Åkerman and Ville Hising.</p>
      <div id="jan-erik-gallery-root"></div>
    </div>
  </div>

  <div id="jan-erik-lightbox" class="lightbox" aria-hidden="true">
    <a href="#" class="lightbox-backdrop" aria-label="Close image preview"></a>
    <div class="lightbox-content">
      <button type="button" class="lightbox-nav lightbox-prev" aria-label="Previous image">‹</button>
      <img id="jan-erik-lightbox-image" src="" alt="">
      <button type="button" class="lightbox-nav lightbox-next" aria-label="Next image">›</button>
      <div id="jan-erik-lightbox-meta" class="lightbox-meta">
        <p id="jan-erik-lightbox-caption" class="lightbox-caption"></p>
      </div>
      <a href="#" class="lightbox-close" aria-label="Close image preview">Close</a>
    </div>
  </div>

  <script>
    var janErikSlides = [];
    var currentJanErikIndex = -1;
    var sections = [
      {
        title: "Oktober 2005 — Ladugårdsgärdet",
        credit: "All pictures © Jan-Erik Saarinen.",
        path: "october-2005",
        files: [
          "rlzoktober2005a (1a).jpg",
          "rlzoktober2005a (8b).jpg",
          "rlzoktober2005b (6d).jpg"
        ]
      },
      {
        title: "Tech Noir 2003",
        credit: "All pictures © Jan-Erik Saarinen.",
        path: "tech-noir-2003",
        files: [
          "rlztechnoir2003 (4b).jpg",
          "rlztechnoir2003 (5b).jpg",
          "rlztechnoir2003 (6d).jpg"
        ]
      },
      {
        title: "Frihamnen 2004",
        credit: "All pictures © Jan-Erik Saarinen.",
        path: "frihamnen-2004",
        files: [
          "rlzdocksmay2004 (2c).jpg",
          "rlzdocksmay2004 (3a).jpg",
          "rlzdocksmay2004 (4a).jpg"
        ]
      }
    ];

    function toSrc(section, fileName) {
      return "/gallery/jan-erik-saarinen/" + section.path + "/" + fileName;
    }

    function showJanErikImage(index) {
      if (!janErikSlides.length) return;
      var bounded = (index + janErikSlides.length) % janErikSlides.length;
      currentJanErikIndex = bounded;
      var slide = janErikSlides[bounded];
      var image = document.getElementById("jan-erik-lightbox-image");
      var meta = document.getElementById("jan-erik-lightbox-meta");
      var caption = document.getElementById("jan-erik-lightbox-caption");
      image.src = slide.src;
      image.alt = slide.alt;
      caption.textContent = slide.caption || "";
      meta.style.display = slide.caption ? "block" : "none";
    }

    function openLightbox(index) {
      if (!janErikSlides.length) return;
      showJanErikImage(index);
      var lightbox = document.getElementById("jan-erik-lightbox");
      lightbox.style.display = "block";
      lightbox.setAttribute("aria-hidden", "false");
    }

    function closeLightbox() {
      var lightbox = document.getElementById("jan-erik-lightbox");
      var image = document.getElementById("jan-erik-lightbox-image");
      var meta = document.getElementById("jan-erik-lightbox-meta");
      var caption = document.getElementById("jan-erik-lightbox-caption");
      image.src = "";
      image.alt = "";
      caption.textContent = "";
      meta.style.display = "none";
      lightbox.style.display = "none";
      lightbox.setAttribute("aria-hidden", "true");
      currentJanErikIndex = -1;
    }

    function nextJanErikImage(step) {
      if (currentJanErikIndex < 0) return;
      showJanErikImage(currentJanErikIndex + step);
    }

    function renderSections() {
      var root = document.getElementById("jan-erik-gallery-root");
      var fragment = document.createDocumentFragment();

      sections.forEach(function (section) {
        var sectionEl = document.createElement("section");
        sectionEl.className = "past-gigs-section";

        var heading = document.createElement("h2");
        heading.className = "year-subtitle";
        heading.textContent = section.title;

        var credit = document.createElement("p");
        credit.className = "past-gigs-credit";
        credit.textContent = section.credit;

        var grid = document.createElement("div");
        grid.className = "archive-gallery";

        section.files.forEach(function (fileName, index) {
          var src = toSrc(section, fileName);
          var alt = section.title + " image " + (index + 1);
          var slideIndex = janErikSlides.push({ src: src, alt: alt, caption: section.title }) - 1;

          var card = document.createElement("article");
          card.className = "archive-card";
          var link = document.createElement("a");
          link.href = "#";
          link.addEventListener("click", function (event) {
            event.preventDefault();
            openLightbox(slideIndex);
          });

          var img = document.createElement("img");
          img.src = src;
          img.alt = alt;
          img.loading = "lazy";

          link.appendChild(img);
          card.appendChild(link);
          grid.appendChild(card);
        });

        sectionEl.appendChild(heading);
        sectionEl.appendChild(credit);
        sectionEl.appendChild(grid);
        fragment.appendChild(sectionEl);
      });

      root.appendChild(fragment);
    }

    document.querySelector("#jan-erik-lightbox .lightbox-backdrop").addEventListener("click", function (event) {
      event.preventDefault();
      closeLightbox();
    });
    document.querySelector("#jan-erik-lightbox .lightbox-close").addEventListener("click", function (event) {
      event.preventDefault();
      closeLightbox();
    });
    document.querySelector("#jan-erik-lightbox .lightbox-prev").addEventListener("click", function (event) {
      event.preventDefault();
      event.stopPropagation();
      nextJanErikImage(-1);
    });
    document.querySelector("#jan-erik-lightbox .lightbox-next").addEventListener("click", function (event) {
      event.preventDefault();
      event.stopPropagation();
      nextJanErikImage(1);
    });
    document.querySelector("#jan-erik-lightbox .lightbox-content").addEventListener("click", function (event) {
      if (event.target !== event.currentTarget) return;
      closeLightbox();
    });
    window.addEventListener("keydown", function (event) {
      var key = event.key || event.code;
      if (key === "Escape" || key === "Esc") closeLightbox();
      if (key === "ArrowLeft") nextJanErikImage(-1);
      if (key === "ArrowRight") nextJanErikImage(1);
    });

    renderSections();
  </script>
</body>
</html>
