<body>

  <div id="misc-lightbox" class="lightbox" aria-hidden="true">
    <a href="#" class="lightbox-backdrop" aria-label="Close image preview"></a>
    <div class="lightbox-content">
      <button type="button" class="lightbox-nav lightbox-prev" aria-label="Previous image">‹</button>
      <img id="misc-lightbox-image" src="" alt="">
      <button type="button" class="lightbox-nav lightbox-next" aria-label="Next image">›</button>
      <div id="misc-lightbox-meta" class="lightbox-meta">
        <p id="misc-lightbox-caption" class="lightbox-caption"></p>
      </div>
      <a href="#" class="lightbox-close" aria-label="Close image preview">Close</a>
    </div>
  </div>

  <script>

          "rlzdocks03-rustydoorcloseup-desat-sml.jpg",

        ]
      }
    ];

    function toSrc(fileName) {
      if (fileName.indexOf("../wallpaper/") === 0) return "/gallery/misc/wallpaper/" + fileName.slice("../wallpaper/".length);
      if (fileName.indexOf("../pre/") === 0) return "/gallery/misc/pre/" + fileName.slice("../pre/".length);
      if (fileName.indexOf("../press/") === 0) return "/gallery/misc/press/" + fileName.slice("../press/".length);
      if (fileName.indexOf("../promo-tiff/") === 0) return "/gallery/misc/promo-tiff/" + fileName.slice("../promo-tiff/".length);
      return "/gallery/misc/promo/" + fileName;
    }

    function showMiscImage(index) {
      if (!miscSlides.length) return;
      var bounded = (index + miscSlides.length) % miscSlides.length;
      currentMiscIndex = bounded;
      var slide = miscSlides[bounded];
      var image = document.getElementById("misc-lightbox-image");
      var meta = document.getElementById("misc-lightbox-meta");
      var caption = document.getElementById("misc-lightbox-caption");
      image.src = slide.src;
      image.alt = slide.alt;
      caption.textContent = slide.caption || "";
      meta.style.display = slide.caption ? "block" : "none";
    }

    function openLightbox(index) {
      if (!miscSlides.length) return;
      showMiscImage(index);
      var lightbox = document.getElementById("misc-lightbox");
      lightbox.style.display = "block";
      lightbox.setAttribute("aria-hidden", "false");
    }

    function closeLightbox() {
      var lightbox = document.getElementById("misc-lightbox");
      var image = document.getElementById("misc-lightbox-image");
      var meta = document.getElementById("misc-lightbox-meta");
      var caption = document.getElementById("misc-lightbox-caption");
      image.src = "";
      image.alt = "";
      caption.textContent = "";
      meta.style.display = "none";
      lightbox.style.display = "none";
      lightbox.setAttribute("aria-hidden", "true");
      currentMiscIndex = -1;
    }

    function nextMiscImage(step) {
      if (currentMiscIndex < 0) return;
      showMiscImage(currentMiscIndex + step);
    }

    function renderSections() {
      var root = document.getElementById("misc-gallery-root");
      var fragment = document.createDocumentFragment();

      sections.forEach(function (section) {
        var sectionEl = document.createElement("section");
        sectionEl.className = "past-gigs-section";

        var heading = document.createElement("h2");
        heading.className = "year-subtitle";
        heading.textContent = section.title;

        var credit = document.createElement("p");
        credit.className = "past-gigs-credit";
        credit.textContent = section.credit;

        var grid = document.createElement("div");
        grid.className = "archive-gallery";

        section.files.forEach(function (fileName, index) {
          var src = toSrc(fileName);
          var alt = section.title + " image " + (index + 1);
          var slideIndex = miscSlides.push({ src: src, alt: alt, caption: section.title }) - 1;

          var card = document.createElement("article");
          card.className = "archive-card";
          var link = document.createElement("a");
          link.href = "#";
          link.addEventListener("click", function (event) {
            event.preventDefault();
            openLightbox(slideIndex);
          });

          var img = document.createElement("img");
          img.src = src;
          img.alt = alt;
          img.loading = "lazy";

          link.appendChild(img);
          card.appendChild(link);
          grid.appendChild(card);
        });

        sectionEl.appendChild(heading);
        sectionEl.appendChild(credit);
        sectionEl.appendChild(grid);
        fragment.appendChild(sectionEl);
      });

      root.appendChild(fragment);
    }

    document.querySelector("#misc-lightbox .lightbox-backdrop").addEventListener("click", function (event) {
      event.preventDefault();
      closeLightbox();
    });
    document.querySelector("#misc-lightbox .lightbox-close").addEventListener("click", function (event) {
      event.preventDefault();
      closeLightbox();
    });
    document.querySelector("#misc-lightbox .lightbox-prev").addEventListener("click", function (event) {
      event.preventDefault();
      event.stopPropagation();
      nextMiscImage(-1);
    });
    document.querySelector("#misc-lightbox .lightbox-next").addEventListener("click", function (event) {
      event.preventDefault();
      event.stopPropagation();
      nextMiscImage(1);
    });
    document.querySelector("#misc-lightbox .lightbox-content").addEventListener("click", function (event) {
      if (event.target !== event.currentTarget) return;
      closeLightbox();
    });
    window.addEventListener("keydown", function (event) {
      var key = event.key || event.code;
      if (key === "Escape" || key === "Esc") closeLightbox();
      if (key === "ArrowLeft") nextMiscImage(-1);
      if (key === "ArrowRight") nextMiscImage(1);
    });

    renderSections();
  </script>
